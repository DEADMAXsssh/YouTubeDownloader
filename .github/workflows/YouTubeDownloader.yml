name: 🎯 YouTubeDownloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 YouTube Video URL'
        required: true
        type: string
      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'
      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '1080p'
      split_threshold_mb:
        description: '📦 Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Setup yt-dlp YouTube cookies
        uses: AnimMouse/setup-yt-dlp/cookies@v3
        with:
          cookies: ${{ secrets.YOUTUBE_COOKIES }}

      - name: ⬇️ Download Video
        run: |
          mkdir -p ./downloads/temp
          
          # Get quality from input
          QUALITY="${{ github.event.inputs.quality }}"
          TYPE="${{ github.event.inputs.type }}"
          
          if [ "$TYPE" = "audio" ]; then
            echo "🎵 Downloading audio only..."
            
            # Convert quality to bitrate (e.g., "320kbps" -> "320")
            BITRATE=$(echo "$QUALITY" | sed 's/kbps//')
            
            yt-dlp -f "bestaudio[ext=m4a]" \
                   --extract-audio \
                   --audio-format mp3 \
                   --audio-quality "$BITRATE" \
                   -o "./downloads/temp/%(title)s_%(id)s_%(quality)s.%(ext)s" \
                   "${{ github.event.inputs.url }}"
          else
            echo "🎬 Downloading video at $QUALITY..."
            
            # Extract numeric quality (e.g., "1080p" -> "1080")
            HEIGHT=$(echo "$QUALITY" | sed 's/p//')
            
            yt-dlp -f "bestvideo[height<=$HEIGHT][ext=mp4]+bestaudio[ext=m4a]/best[height<=$HEIGHT]" \
                   --merge-output-format mp4 \
                   -o "./downloads/temp/%(title)s_%(id)s_%(height)p.%(ext)s" \
                   "${{ github.event.inputs.url }}"
          fi
          
          echo "✅ Download complete!"
          ls -la ./downloads/temp/

      - name: 📦 Process and Split Large Files
        run: |
          THRESHOLD_MB="${{ github.event.inputs.split_threshold_mb }}"
          THRESHOLD_BYTES=$((THRESHOLD_MB * 1024 * 1024))
          
          process_file() {
            local file="$1"
            local size=$(stat -c%s "$file")
            local basename=$(basename "$file")
            local size_mb=$((size / 1024 / 1024))
            
            if [[ $THRESHOLD_BYTES -gt 0 && $size -gt $THRESHOLD_BYTES ]]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "✂️ Splitting $basename (${size_mb}MB)"
              echo "   Parts size: ${THRESHOLD_MB}MB each"
              
              cd ./downloads
              zip -r -s "${THRESHOLD_MB}m" "${basename}.zip" "temp/${basename}"
              cd ..
              
              PARTS_COUNT=$(ls ./downloads/${basename}.z* 2>/dev/null | wc -l)
              echo "✅ Created $PARTS_COUNT parts"
              
              # Remove original file from temp
              rm "$file"
            else
              if [[ $THRESHOLD_BYTES -eq 0 ]]; then
                echo "📁 $basename (${size_mb}MB) — split disabled"
              else
                echo "📁 $basename (${size_mb}MB) — under threshold"
              fi
              mv "$file" "./downloads/"
            fi
          }
          
          export -f process_file
          export THRESHOLD_BYTES THRESHOLD_MB
          
          # Process files only if temp directory exists and has files
          if [ -d "./downloads/temp" ] && [ -n "$(ls -A ./downloads/temp 2>/dev/null)" ]; then
            find ./downloads/temp -type f -exec bash -c 'process_file "$0"' {} \;
            rm -rf ./downloads/temp
          fi
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Final files in ./downloads/:"
          ls -lh ./downloads/ 2>/dev/null | tail -n +2 | awk '{print "  • " $NF " (" $5 ")"}'
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📤 Commit and Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add and commit files
          git add ./downloads/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          # Commit and push
          git commit -m "Add YouTube download [skip ci]"
          git push
          
          echo "🎉 Files successfully uploaded to GitHub!"
